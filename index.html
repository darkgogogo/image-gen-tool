<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 内容工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--border:#e8e4dc;
  --text:#1a1814;--text2:#6b6560;--text3:#9c9590;
  --accent:#2563eb;--accent-l:#eff6ff;--accent-b:#bfdbfe;
  --green:#16a34a;--green-l:#f0fdf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-l:#fef2f2;--red-b:#fca5a5;
  --amber:#b45309;--amber-l:#fffbeb;--amber-b:#fcd34d;
  --purple:#6d28d9;--purple-l:#f5f3ff;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px}
.app{max-width:740px;margin:0 auto}
 
/* Header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.header p{font-size:12px;color:var(--text2);margin-top:2px}
 
/* Tab nav */
.tab-nav{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.tab-btn{flex:1;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:none;border:none;border-radius:7px;padding:8px 12px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:not(.active):hover{background:var(--bg);color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}
 
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.step-badge{display:inline-flex;align-items:center;gap:7px;margin-bottom:12px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:13px;font-weight:600}
 
/* Inputs */
.field-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.text-input{display:block;width:100%;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:10px}
.text-input:focus{border-color:var(--accent)}
.text-input::placeholder{color:#c0bbb5}
.api-input{display:block;width:100%;font-family:'DM Mono',monospace;font-size:13px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:10px}
.api-input:focus{border-color:var(--accent)}
.api-input::placeholder{color:#c0bbb5}
.big-textarea{display:block;width:100%;font-family:'DM Mono',monospace;font-size:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--text);outline:none;transition:border-color .15s;resize:vertical;min-height:140px;line-height:1.6}
.big-textarea:focus{border-color:var(--accent)}
.big-textarea::placeholder{color:#c0bbb5}
.md-textarea{display:block;width:100%;font-family:'DM Mono',monospace;font-size:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--text);outline:none;transition:border-color .15s;resize:vertical;min-height:200px;line-height:1.7}
.md-textarea:focus{border-color:var(--accent)}
.md-textarea::placeholder{color:#c0bbb5}
 
/* Buttons */
.btn-primary{display:block;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-success-full{display:block;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;background:var(--green);color:#fff;border:none;border-radius:8px;padding:11px;cursor:pointer;transition:opacity .15s}
.btn-success-full:hover{opacity:.88}
.btn-load{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;cursor:pointer;transition:opacity .15s;margin-top:10px}
.btn-load:hover{opacity:.88}
.api-saved-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.api-saved-info{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--green)}
.btn-reset{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-reset:hover{border-color:var(--red);color:var(--red)}
.api-hint{margin-top:9px;font-size:12px;color:var(--text2);line-height:1.6}
.api-hint a{color:var(--accent)}
.hint{margin-top:8px;font-size:12px;color:var(--text2);line-height:1.6}
.hint code{font-family:'DM Mono',monospace;background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:11px}
.json-error{margin-top:8px;font-size:12px;color:var(--red);display:none}
.reset-link{font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;text-underline-offset:2px;display:inline-block;margin-top:10px}
.reset-link:hover{color:var(--text2)}
 
/* Controls row */
.controls-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.controls-left h2{font-size:14px;font-weight:600;margin-bottom:4px}
.progress-info{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.controls-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-dark{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:var(--text);color:#fff;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-dark:hover{opacity:.82}
.btn-dark:disabled{opacity:.35;cursor:default}
.btn-success-solid{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-success-solid:hover{opacity:.85}
.btn-success-solid:disabled{opacity:.35;cursor:default}
 
/* Image cards */
.image-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.card-tag{flex-shrink:0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:3px 7px;border-radius:4px;margin-top:1px}
.tag-cover{background:var(--purple-l);color:var(--purple)}
.tag-body{background:var(--accent-l);color:var(--accent)}
.card-meta-title{font-size:13px;font-weight:500;margin-bottom:6px}
.desc-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.desc-table td{font-size:12px;padding:3px 0;vertical-align:top}
.desc-table td:first-child{color:var(--text2);white-space:nowrap;padding-right:10px;width:70px}
.desc-table td:last-child{color:var(--text);line-height:1.45}
.prompt-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:8px}
.prompt-box{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;line-height:1.5;word-break:break-word}
.card-body{padding:14px 16px}
 
/* Image states */
.img-placeholder,.img-loading,.img-error{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:13px;aspect-ratio:16/9}
.img-placeholder.cover,.img-loading.cover,.img-error.cover{aspect-ratio:4/3}
.img-placeholder{background:var(--bg);border:1.5px dashed var(--border);color:var(--text2)}
.img-loading{background:linear-gradient(90deg,#f0eee9 25%,#e8e5df 50%,#f0eee9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;color:var(--text2)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.img-error{background:var(--red-l);border:1px solid var(--red-b);color:var(--red);padding:12px;text-align:center;gap:4px}
.img-result{display:block;width:100%;border-radius:8px}
.card-actions{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
.spacer{flex:1}
.btn-gen{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-b);border-radius:6px;padding:7px 14px;cursor:pointer;white-space:nowrap}
.btn-gen:hover{background:#dbeafe}
.btn-gen:disabled{opacity:.4;cursor:default}
.btn-regen{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b);border-radius:6px;padding:7px 14px;cursor:pointer;white-space:nowrap}
.btn-regen:hover{background:#fef3c7}
.btn-regen:disabled{opacity:.4;cursor:default}
.btn-dl-single{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:var(--green-l);color:var(--green);border:1px solid var(--green-b);border-radius:6px;padding:7px 14px;cursor:pointer;white-space:nowrap}
.btn-dl-single:hover{background:#dcfce7}
 
/* Dots */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-idle{background:#d1d5db}
.dot-done{background:var(--green)}
.dot-loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
 
/* Article info */
.article-title{font-size:15px;font-weight:600;line-height:1.45;margin-bottom:6px}
.article-desc{font-size:13px;color:var(--text2);line-height:1.65}
 
/* Style selector */
.style-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.style-chip{flex:1;min-width:120px;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;background:var(--surface2)}
.style-chip:hover{border-color:var(--accent);background:var(--accent-l)}
.style-chip.selected{border-color:var(--accent);background:var(--accent-l)}
.style-chip-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.style-chip.selected .style-chip-name{color:var(--accent)}
.style-chip-desc{font-size:11px;color:var(--text2);line-height:1.4}
</style>
</head>
<body>
<div class="app">
 
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <h1>AI 内容工具</h1>
      <p>文章下载 · 配图生成</p>
    </div>
  </div>
 
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('md')">📄 下载文章 Markdown</button>
    <button class="tab-btn" onclick="switchTab('img')">🎨 生成配图</button>
  </div>
 
  <!-- ── Tab 1: Markdown Download ─────────────────────────────────── -->
  <div id="tab-md" class="tab-panel active">
    <div class="card">
      <div class="step-badge"><span class="step-num">1</span><span class="step-title">粘贴文章内容</span></div>
      <label class="field-label">文件名（不含扩展名）</label>
      <input class="text-input" type="text" id="md-filename" placeholder="例：chatgpt-节点选择指南" />
      <label class="field-label">文章内容（Markdown 格式）</label>
      <textarea class="md-textarea" id="md-content" placeholder="把 Dify 对话里生成的完整文章内容粘贴到这里（中文版或英文版均可）..."></textarea>
    </div>
    <div class="card">
      <div class="step-badge"><span class="step-num">2</span><span class="step-title">下载文件</span></div>
      <button class="btn-success-full" onclick="downloadMd()">↓ 下载 Markdown 文件</button>
      <div class="hint" style="margin-top:10px">下载后可用 Typora、Notion、VS Code 等工具打开编辑</div>
    </div>
  </div>
 
  <!-- ── Tab 2: Image Generator ────────────────────────────────────── -->
  <div id="tab-img" class="tab-panel">
    <div id="img-app"></div>
  </div>
 
</div>
 
<script>
// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['md','img'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'img') renderImg();
}
 
// ── Markdown download ─────────────────────────────────────────────────────────
function downloadMd() {
  const content  = document.getElementById('md-content').value.trim();
  const filename = (document.getElementById('md-filename').value.trim() || 'article') + '.md';
  if (!content) { alert('请先粘贴文章内容'); return; }
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
 
// ── Image generator ───────────────────────────────────────────────────────────
const STORAGE_KEY = "fal_api_key_v1";
 
// Recraft V3 style options — all using the same model (Recraft V3), unified per article
const STYLES = [
  { value: "digital_illustration",               label: "数字插画",     desc: "现代清晰，科技/科普类首选" },
  { value: "digital_illustration/2d_art_poster", label: "2D 海报",     desc: "版式感强，封面/品牌视觉" },
  { value: "digital_illustration/hand_drawn",    label: "手绘插画",     desc: "温暖亲切，场景/故事类" },
  { value: "digital_illustration/grain",         label: "颗粒质感",     desc: "层次丰富，深度叙事类" },
  { value: "digital_illustration/hand_drawn_outline", label: "手绘线稿", desc: "轻盈简洁，概念草图感" },
  { value: "vector_illustration/line_art",       label: "线条矢量",     desc: "精准简洁，流程/示意图" },
  { value: "vector_illustration/line_circuit",   label: "电路线条",     desc: "科技感强，适合网络/技术类" },
  { value: "realistic_image/natural_light",      label: "自然光写实",   desc: "真实感强，场景氛围类" },
];
 
let apiKey    = localStorage.getItem(STORAGE_KEY) || "";
let apiSaved  = !!apiKey;
let article   = null;
let states    = {};
let activeStyle = "digital_illustration"; // article-level style, shared by all images
 
function saveKey() {
  const el = document.getElementById("key-input");
  const v  = el ? el.value.trim() : "";
  if (!v) { alert("请输入 API Key"); return; }
  apiKey = v; apiSaved = true;
  localStorage.setItem(STORAGE_KEY, apiKey);
  renderImg();
}
function resetKey() {
  if (!confirm("确认清除已保存的 API Key？")) return;
  apiKey = ""; apiSaved = false;
  localStorage.removeItem(STORAGE_KEY);
  renderImg();
}
 
function loadJSON() {
  const el  = document.getElementById("json-input");
  const err = document.getElementById("json-error");
  try {
    const raw = el.value.trim();
    if (!raw) { showErr(err, "请先粘贴配图 JSON"); return; }
    const data = JSON.parse(raw);
    if (Array.isArray(data)) {
      article = { title: "文章", desc: "", images: data };
    } else if (data.images && Array.isArray(data.images)) {
      article = data;
    } else {
      showErr(err, "JSON 格式不正确，请确认是 Claude 输出的配图数据"); return;
    }
    for (const img of article.images) {
      if (!img.id || !img.en) { showErr(err, `图片对象缺少必要字段 (id / en)`); return; }
    }
    // Use article-level style if provided, otherwise keep current selection
    if (article.style) activeStyle = article.style;
    err.style.display = "none";
    states = {};
    article.images.forEach(img => states[img.id] = { status: "idle" });
    renderImg();
  } catch(e) { showErr(err, "JSON 解析失败：" + e.message); }
}
function showErr(el, msg) { el.textContent = msg; el.style.display = "block"; }
function resetArticle() { article = null; states = {}; renderImg(); }
 
function setStyle(val) {
  activeStyle = val;
  // Reset all generated images so user can regenerate with new style
  if (article) {
    const hasDone = article.images.some(i => states[i.id].status === "done");
    if (hasDone && !confirm("切换风格后已生成的图片需要重新生成，确认切换吗？")) return;
    article.images.forEach(img => { if (states[img.id].status === "done") states[img.id] = { status: "idle" }; });
  }
  renderImg();
}
 
async function generateImage(id) {
  if (!apiKey) { alert("请先输入并保存 API Key"); return; }
  const img = article.images.find(i => i.id === id);
  if (!img) return;
  states[id] = { status: "loading" };
  renderImg();
  try {
    const res = await fetch("https://fal.run/fal-ai/recraft/v3/text-to-image", {
      method: "POST",
      headers: { "Authorization": `Key ${apiKey}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: img.en,
        image_size: img.size || "landscape_16_9",
        style: activeStyle,   // always use article-level style
        num_images: 1,
        enable_safety_checker: true
      })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${res.status}`); }
    const data = await res.json();
    const url  = data.images?.[0]?.url;
    if (!url) throw new Error("未返回图片 URL");
    states[id] = { status: "done", url };
  } catch(e) { states[id] = { status: "error", error: e.message }; }
  renderImg();
}
 
async function generateAll() {
  for (const img of article.images) {
    if (states[img.id].status !== "done") await generateImage(img.id);
  }
}
 
function downloadOne(url, filename) {
  return fetch(url).then(r => r.blob()).then(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  }).catch(() => window.open(url, "_blank"));
}
async function downloadAll() {
  const done = article.images.filter(i => states[i.id].status === "done");
  if (!done.length) { alert("还没有已生成的图片"); return; }
  for (const img of done) {
    await downloadOne(states[img.id].url, `${img.section || img.id}.jpg`);
    await new Promise(r => setTimeout(r, 400));
  }
}
 
function doneCount()  { return article ? article.images.filter(i => states[i.id].status === "done").length : 0; }
function anyLoading() { return article ? article.images.some(i  => states[i.id].status === "loading")     : false; }
 
function descTableHtml(desc) {
  if (!desc || typeof desc !== "object") return "";
  return `<table class="desc-table">${Object.entries(desc).map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}</table>`;
}
 
function imgArea(img) {
  const st = states[img.id], cc = img.type === "cover" ? " cover" : "";
  if (st.status === "idle")    return `<div class="img-placeholder${cc}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>等待生成</span></div>`;
  if (st.status === "loading") return `<div class="img-loading${cc}">生成中，约 10～20 秒…</div>`;
  if (st.status === "done")    return `<img class="img-result" src="${st.url}" alt="${img.section || img.id}"/>`;
  return `<div class="img-error${cc}"><span>⚠ 生成失败</span><span style="font-size:11px;opacity:.8">${st.error}</span></div>`;
}
 
function cardActions(img) {
  const st = states[img.id], busy = !apiSaved || anyLoading();
  if (st.status === "idle" || st.status === "error")
    return `<div class="card-actions"><button class="btn-gen" onclick="generateImage('${img.id}')" ${busy?"disabled":""}>✦ 生成</button></div>`;
  if (st.status === "loading")
    return `<div class="card-actions"><button class="btn-gen" disabled>生成中…</button></div>`;
  return `<div class="card-actions">
    <button class="btn-regen" onclick="generateImage('${img.id}')" ${busy?"disabled":""}>↺ 重新生成</button>
    <div class="spacer"></div>
    <button class="btn-dl-single" onclick="downloadOne('${st.url}','${(img.section||img.id)}.jpg')">↓ 下载此图</button>
  </div>`;
}
 
function renderImg() {
  const done = doneCount(), total = article ? article.images.length : 0;
  const styleSelectorHtml = `
    <div class="card">
      <div class="step-badge"><span class="step-num">${article ? "2" : "3"}</span><span class="step-title">选择配图风格（全文统一）</span></div>
      <div class="style-grid">
        ${STYLES.map(s => `
          <div class="style-chip ${activeStyle === s.value ? "selected" : ""}" onclick="setStyle('${s.value}')">
            <div class="style-chip-name">${s.label}</div>
            <div class="style-chip-desc">${s.desc}</div>
          </div>
        `).join("")}
      </div>
      <div class="hint">⚠ Recraft V3 · 同一风格应用到本文所有配图，确保视觉一致性。切换风格后需重新生成。</div>
    </div>
  `;
 
  document.getElementById("img-app").innerHTML = `
 
    <!-- API Key -->
    <div class="card">
      <div class="step-badge"><span class="step-num">1</span><span class="step-title">配置 fal.ai API Key</span></div>
      ${apiSaved ? `
        <div class="api-saved-row">
          <div class="api-saved-info"><span class="dot dot-done"></span>API Key 已保存，下次打开无需重新输入</div>
          <button class="btn-reset" onclick="resetKey()">清除 Key</button>
        </div>
      ` : `
        <input class="api-input" type="password" id="key-input" placeholder="fal_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"/>
        <button class="btn-primary" onclick="saveKey()">确认并保存</button>
        <div class="api-hint">注册 <a href="https://fal.ai" target="_blank">fal.ai</a> → Dashboard → API Keys 获取，首次充值 $5 可长期使用</div>
      `}
    </div>
 
    ${!article ? `
    <!-- JSON paste -->
    <div class="card">
      <div class="step-badge"><span class="step-num">2</span><span class="step-title">粘贴配图数据</span></div>
      <textarea class="big-textarea" id="json-input" placeholder='在对话里回复「生成配图」，把 Claude 输出的 JSON 粘贴到这里...'></textarea>
      <div class="json-error" id="json-error"></div>
      <div class="hint">💡 Claude 会输出一段以 <code>{</code> 开头的 JSON，完整复制过来即可</div>
      <button class="btn-load" onclick="loadJSON()">载入配图数据 →</button>
    </div>
 
    ${styleSelectorHtml}
 
    ` : `
 
    ${styleSelectorHtml}
 
    <!-- Article info -->
    <div class="card">
      <div class="section-label">当前文章</div>
      <div class="article-title">${article.title}</div>
      ${article.desc ? `<div class="article-desc">${article.desc}</div>` : ""}
      <span class="reset-link" onclick="resetArticle()">↩ 更换文章 / 重新粘贴数据</span>
    </div>
 
    <!-- Generate -->
    <div class="controls-row">
      <div class="controls-left">
        <div class="step-badge"><span class="step-num">4</span><span class="step-title">生成配图</span></div>
        <div class="progress-info">
          <span class="dot ${anyLoading()?"dot-loading":done===total&&total>0?"dot-done":"dot-idle"}"></span>
          ${done} / ${total} 已完成
        </div>
      </div>
      <div class="controls-btns">
        <button class="btn-success-solid" onclick="downloadAll()" ${done===0?"disabled":""}>↓ 全部下载 (${done})</button>
        <button class="btn-dark" onclick="generateAll()" ${!apiSaved||anyLoading()?"disabled":""}>⚡ 全部生成</button>
      </div>
    </div>
 
    ${article.images.map(img => `
      <div class="image-card">
        <div class="card-header">
          <span class="card-tag ${img.type==="cover"?"tag-cover":"tag-body"}">${img.type==="cover"?"封面":"正文"}</span>
          <div style="flex:1;min-width:0">
            <div class="card-meta-title">${img.section || img.id}</div>
            ${descTableHtml(img.desc)}
            <div class="prompt-label">AI 生成 Prompt（英文）</div>
            <div class="prompt-box">${img.en}</div>
          </div>
        </div>
        <div class="card-body">
          ${imgArea(img)}
          ${cardActions(img)}
        </div>
      </div>
    `).join("")}
    `}
  `;
}
 
// Initial render
renderImg();
</script>
</body>
</html>
